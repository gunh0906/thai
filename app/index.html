<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="한국어로 태국어 단어와 회화 예문을 검색하는 모바일 웹 단어장"
    />
    <meta name="theme-color" content="#ff8a3d" />
    <title>태국어 포켓북</title>
    <link rel="manifest" href="./manifest.webmanifest?v=20260410b" />
    <link rel="icon" href="./icon.svg?v=20260410b" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260410b" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-top">
          <div>
            <div class="eyebrow">Thai Pocketbook</div>
            <h1>태국어 포켓북</h1>
            <p class="hero-copy">한국어로 찾으면 단어를 먼저, 바로 쓸 회화를 그 아래에 보여줍니다.</p>
          </div>
          <button
            id="menuButton"
            class="ghost-button hero-menu-button icon-button"
            type="button"
            aria-expanded="false"
            aria-controls="menuSheet"
            aria-label="메뉴 열기"
          >
            <span aria-hidden="true">☰</span>
            <span class="sr-only">메뉴</span>
          </button>
        </div>

        <form id="searchForm" class="search-panel">
          <label class="search-label" for="searchInput">검색</label>
          <div class="search-row">
            <input
              id="searchInput"
              type="search"
              autocomplete="off"
              placeholder="예: 방바꿔주세요, 얼마예요, 물, 와이파이, 병원"
            />
            <button id="searchButton" class="primary-button search-button" type="submit">검색</button>
          </div>
          <div class="search-actions">
            <button id="clearSearchButton" class="ghost-button" type="button">지우기</button>
          </div>
        </form>

        <div class="hero-meta">
          <div class="hero-note" id="searchStatus"></div>
          <div class="hero-note" id="filterSummary"></div>
        </div>
      </header>

      <main class="content-stack search-first-layout">
        <section class="panel">
          <div class="section-top">
            <div>
              <p class="section-kicker">빠른 검색</p>
              <h2>자주 찾는 표현</h2>
            </div>
          </div>
          <div id="quickSearchChips" class="quick-search"></div>
        </section>

        <section id="queryInsightsPanel" class="panel" hidden>
          <div class="section-top">
            <div>
              <p class="section-kicker">검색 해석</p>
              <h2>이 표현을 이렇게 풀어서 찾고 있어요</h2>
            </div>
            <p id="activeSummary" class="section-description"></p>
          </div>
          <div id="queryInsights" class="chip-row"></div>
        </section>

        <section id="resultStack" class="result-stack" hidden>
          <section class="panel">
            <div class="section-top">
              <div>
                <p class="section-kicker">단어</p>
                <h2>먼저 잡아둘 핵심 단어</h2>
              </div>
              <p id="vocabMeta" class="section-description"></p>
            </div>
            <div id="vocabResults" class="card-stack"></div>
          </section>

          <section class="panel">
            <div class="section-top">
              <div>
                <p class="section-kicker">회화</p>
                <h2>바로 보여주거나 말할 문장</h2>
              </div>
              <p id="sentenceMeta" class="section-description"></p>
            </div>
            <div id="sentenceResults" class="card-stack"></div>
          </section>
        </section>
      </main>
    </div>

    <div id="menuOverlay" class="menu-overlay" hidden></div>
    <aside id="menuSheet" class="menu-sheet" hidden>
      <div class="menu-sheet-inner">
        <div class="menu-header">
          <div>
            <p class="section-kicker">설정</p>
            <h2>필터와 내 데이터</h2>
          </div>
          <button id="menuCloseButton" class="ghost-button" type="button">닫기</button>
        </div>

        <section class="menu-section">
          <div class="section-top">
            <div>
              <p class="section-kicker">상황별 검색</p>
              <h2>필터</h2>
            </div>
            <button id="resetFiltersButton" class="ghost-button" type="button">필터 초기화</button>
          </div>
          <div id="scenarioChips" class="chip-row"></div>
        </section>

        <section class="menu-section">
          <div class="section-top">
            <div>
              <p class="section-kicker">내 데이터</p>
              <h2>단어와 문장 추가</h2>
            </div>
            <p class="section-description">휴대폰에서도 직접 보강할 수 있습니다.</p>
          </div>

          <form id="entryForm" class="entry-form">
            <div class="form-grid">
              <label>
                <span>구분</span>
                <select name="kind">
                  <option value="vocab">단어</option>
                  <option value="sentence">문장</option>
                </select>
              </label>

              <label class="wide">
                <span>태국어 발음 표기</span>
                <input
                  name="thai"
                  type="text"
                  placeholder="예: 타오라이, 체크 빈, 홍 남 유 티 나이"
                  required
                />
              </label>

              <label class="wide">
                <span>한국어 뜻</span>
                <input
                  name="korean"
                  type="text"
                  placeholder="예: 얼마예요 / 계산 부탁해요 / 방 바꿔주세요"
                  required
                />
              </label>

              <label class="wide">
                <span>상황 태그</span>
                <input name="tags" type="text" placeholder="예: 이동, 식당, 건강" />
              </label>

              <label class="wide">
                <span>메모</span>
                <textarea
                  name="note"
                  rows="3"
                  placeholder="예: 호텔 프런트에서 자주 씀 / 택시 기사에게 보여주기 좋음"
                ></textarea>
              </label>
            </div>

            <div class="form-actions">
              <button class="primary-button" type="submit">저장하기</button>
              <p id="saveFeedback" class="feedback-text" aria-live="polite"></p>
            </div>
          </form>
        </section>

        <section class="menu-section">
          <div class="section-top">
            <div>
              <p class="section-kicker">백업</p>
              <h2>내가 추가한 항목 관리</h2>
            </div>
            <p class="section-description">JSON으로 내보내고 다시 가져올 수 있습니다.</p>
          </div>

          <div class="backup-actions">
            <button id="exportButton" class="ghost-button" type="button">내 데이터 내보내기</button>
            <button id="importButton" class="ghost-button" type="button">JSON 가져오기</button>
            <button id="clearCustomButton" class="ghost-button danger" type="button">내가 추가한 항목 비우기</button>
            <input id="importInput" type="file" accept="application/json,.json" hidden />
          </div>

          <div id="customSummary" class="active-summary"></div>
          <div id="customEntries" class="card-stack compact"></div>
        </section>

        <section class="menu-section">
          <div class="section-top">
            <div>
              <p class="section-kicker">단어장</p>
              <h2>앱 정보</h2>
            </div>
          </div>
          <div id="statsGrid" class="stats-grid compact-stats"></div>
          <p id="datasetNote" class="section-description dataset-note"></p>
        </section>
      </div>
    </aside>

    <script src="./data.js?v=20260410b"></script>
    <script src="./app.js?v=20260410b"></script>
  </body>
</html>
